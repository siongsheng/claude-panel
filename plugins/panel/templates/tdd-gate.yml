name: TDD gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Least privilege: read the code only.
permissions:
  contents: read

concurrency:
  group: tdd-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tdd-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # the check is near-instant; cap a hung runner.
    steps:
      - uses: actions/checkout@v4
        with:
          # tdd-check verifies test-before-impl by ANCESTRY, so the full
          # history of base..head must be present -- a shallow clone breaks it.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Self-test: prove the vendored checker actually works in THIS repo's CI,
      # not merely upstream. `/panel-init` vendors bin/test_tdd_check.py next to
      # bin/tdd-check; if a repo vendored the checker before this step existed,
      # skip cleanly (re-run /panel-init to add the tests).
      - name: Self-test tdd-check (if vendored)
        run: |
          if [ -f bin/test_tdd_check.py ]; then
            python3 bin/test_tdd_check.py
          else
            echo "::notice::bin/test_tdd_check.py not vendored — re-run /panel-init to enable the tdd-check self-test."
          fi
      # Run against the PR's ACTUAL base ref, never a hardcoded `main`.
      - name: Run tdd-check
        run: >-
          python3 bin/tdd-check
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"
