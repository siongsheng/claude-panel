name: Findings ledger

# Auto-posts the ONE "Review Findings Ledger" comment on a PR once ALL the
# reviewer checks have finished. Runs a headless Claude Code session in CI
# (claude-code-action) with the panel plugin installed, so it applies panel's
# blocker-triage + findings-ledger skills: read every reviewer's output, triage
# each finding (drop the ~30-40% false blockers), dedupe, and post/edit a single
# consolidated table -- a clean "no issues found" ledger when nothing survives.
#
# ADVISORY: it only reports; it never fails the build. It is NOT a reviewer.
#
# SECURITY: workflow_run runs in the BASE repo with secrets + write scope even
# when the triggering reviewer ran on a fork. This job is therefore gated to
# SAME-REPO PRs only -- a fork PR must never reach the OAuth token / a
# Bash-capable agent fed attacker-controlled PR text. (checkout also never uses
# the head ref, so no untrusted code is executed.)
#
# EXACTLY-ONCE: fires on each reviewer's completion, then WAITS (bounded) until
# none of the REVIEWER checks (below) are still running -- other repo checks are
# ignored, so an unrelated pending check can't stall the ledger. concurrency
# cancels an in-flight waiter when a later reviewer finishes, so the LAST
# reviewer to complete writes the ledger -- no self-skip race, no double-post.
on:
  workflow_run:
    # NAME CONTRACT: each entry MUST exactly match a reviewer workflow's `name:`.
    # These are also the names the waiter filters on (REVIEWERS below). Rename a
    # reviewer without updating BOTH places and the ledger silently stops firing.
    workflows: ["Claude Code Review", "Architecture review", "DeepSeek review", "TDD gate"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read      # read reviewer workflow-RUN status for the completion gate
                     # (robust to the empty-combined-status "pending" quirk that
                     # made gh-pr-checks bucket detection time out)

concurrency:
  # Key by PR when resolvable (same-repo PRs populate pull_requests), else the
  # branch -- so two PRs from one branch don't cancel each other's ledger.
  group: findings-ledger-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same-repo PRs only (never fork PRs -- see SECURITY note above).
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      GH_TOKEN: ${{ github.token }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      REPO: ${{ github.repository }}
      # Must match the `workflows:` list above (the reviewer workflow names).
      REVIEWERS: 'Claude Code Review|Architecture review|DeepSeek review|TDD gate'
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "CLAUDE_CODE_OAUTH_TOKEN not set -- skipping auto findings ledger."

      - name: Resolve PR + wait until reviewer checks complete
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          PR=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" \
                 --jq 'map(select(.state=="open"))[0].number // empty' || true)
          if [ -z "$PR" ]; then
            echo "no open PR for $HEAD_SHA; nothing to do"; echo "SKIP=1" >> "$GITHUB_ENV"; exit 0
          fi
          echo "PR=$PR" >> "$GITHUB_ENV"
          # Wait (bounded) until every REVIEWER workflow RUN on this head has
          # completed. Gate on the Actions RUN status (needs actions: read), NOT
          # `gh pr checks` buckets: when a PR's reviewers post no commit status,
          # the commit's COMBINED status stays "pending" (GitHub's default with
          # 0 statuses), which fooled bucket detection into a perpetual "pending"
          # -> 6min timeout -> SKIP -> the ledger silently never posted.
          # concurrency (cancel-in-progress) supersedes this waiter when a later
          # reviewer finishes, so the LAST reviewer proceeds.
          for i in $(seq 1 24); do
            running=$(gh api "repos/$REPO/actions/runs?head_sha=$HEAD_SHA&event=pull_request&per_page=100" 2>/dev/null \
              | jq --arg r "$REVIEWERS" \
                  '[.workflow_runs[] | select(.name|test("^(" + $r + ")$")) | select(.status != "completed")] | length' \
              2>/dev/null || echo 1)
            running=${running:-1}
            if [ "$running" = "0" ]; then
              echo "all reviewer runs complete -- writing ledger for PR #$PR"; exit 0
            fi
            echo "reviewer runs still running: $running (poll $i)…"; sleep 15
          done
          echo "::notice title=Findings ledger::Timed out waiting for reviewer checks on PR #$PR; ledger not posted this run."
          echo "SKIP=1" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        with:
          fetch-depth: 0
          # base default branch only -- never the untrusted head ref.

      - name: Compose findings ledger
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        continue-on-error: true   # advisory: a flaky agent run must not show red
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          plugin_marketplaces: 'https://github.com/siongsheng/claude-panel.git'
          plugins: 'panel@claude-panel'
          # WHY: claude-code-action defaults to an inline-review-comment model and
          # withholds Bash/gh from the agent -- so the agent's attempts to POST the
          # ledger via `gh` are denied and NOTHING is posted (observed: num_turns>0,
          # is_error:false, permission_denials_count:5, "No buffered inline
          # comments"). Grant exactly the tools the prompt needs: `gh`/`git` to read
          # reviewer comments + the diff, create/PATCH the one ledger comment, and
          # Read/Write to compose it. Without this the auto-ledger silently no-ops.
          claude_args: '--allowed-tools "Bash(gh:*),Bash(git:*),Read,Write,Grep,Glob"'
          prompt: |
            Compose the Review Findings Ledger for pull request #${{ env.PR }}
            in ${{ env.REPO }}. All reviewer checks have completed. Use the
            panel `blocker-triage` and `findings-ledger` skills.

            1. Gather every reviewer's output on the PR via `gh`: the DeepSeek
               comment, the Claude /code-review comments, the architecture-review
               comment(s), and the tdd-gate result. Also read the diff
               (base..head) for context.
            2. TRIAGE with blocker-triage: for each raised finding decide real vs
               false (expect ~30-40% false), set the triaged severity, and check
               whether it is pre-existing on the base branch. Dedupe findings
               that multiple reviewers raised into one row.
            3. Post the SINGLE ledger via findings-ledger, CUMULATIVELY. First
               fetch the existing "📋 Review Findings Ledger" comment (match by
               that marker) and MERGE into it -- do NOT regenerate from scratch:
               preserve every prior row and its ID, change only the Status of
               resolved findings (mark them ✅ Fixed), append new findings as new
               rows, and NEVER drop a row a later review no longer reports (a
               fixed finding stays as a ✅ Fixed row). EDIT that one comment in
               place (never post a second). Columns: ID | Finding | Source |
               Severity | Status. Only when the ledger has NEVER existed AND
               nothing survives triage, post the clean confirmation ("✅ Reviewed
               -- no issues found") listing which reviewers ran.
            ADVISORY ONLY: report; do not block or fail. Do not modify code.
