name: Findings ledger

# Auto-posts the ONE "Review Findings Ledger" comment on a PR once ALL the
# reviewer checks have finished. Runs a headless Claude Code session in CI
# (claude-code-action) with the panel plugin installed, so it applies panel's
# blocker-triage + findings-ledger skills: read every reviewer's output, triage
# each finding (drop the ~30-40% false blockers), dedupe, and post/edit a single
# consolidated table -- a clean "no issues found" ledger when nothing survives.
#
# ADVISORY: it only reports; it never fails the build. It is NOT a reviewer.
#
# SECURITY: workflow_run runs in the BASE repo with secrets + write scope even
# when the triggering reviewer ran on a fork. This job is therefore gated to
# SAME-REPO PRs only -- a fork PR must never reach the OAuth token / a
# Bash-capable agent fed attacker-controlled PR text. (checkout also never uses
# the head ref, so no untrusted code is executed.)
#
# EXACTLY-ONCE: fires on each reviewer's completion, then WAITS (bounded) until
# none of the REVIEWER checks (below) are still running -- other repo checks are
# ignored, so an unrelated pending check can't stall the ledger. concurrency
# cancels an in-flight waiter when a later reviewer finishes, so the LAST
# reviewer to complete writes the ledger -- no self-skip race, no double-post.
on:
  workflow_run:
    # NAME CONTRACT: each entry MUST exactly match a reviewer workflow's `name:`.
    # These are also the names the waiter filters on (REVIEWERS below). Rename a
    # reviewer without updating BOTH places and the ledger silently stops firing.
    workflows: ["Claude Code Review", "Architecture review", "DeepSeek review", "TDD gate"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read      # read reviewer workflow-RUN status for the completion gate
                     # (robust to the empty-combined-status "pending" quirk that
                     # made gh-pr-checks bucket detection time out)

concurrency:
  # Key by PR when resolvable (same-repo PRs populate pull_requests), else the
  # branch -- so two PRs from one branch don't cancel each other's ledger.
  group: findings-ledger-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same-repo PRs only (never fork PRs -- see SECURITY note above).
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      GH_TOKEN: ${{ github.token }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      REPO: ${{ github.repository }}
      # Must match the `workflows:` list above (the reviewer workflow names).
      REVIEWERS: 'Claude Code Review|Architecture review|DeepSeek review|TDD gate'
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "CLAUDE_CODE_OAUTH_TOKEN not set -- skipping auto findings ledger."

      - name: Resolve PR + wait until reviewer checks complete
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          PR=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" \
                 --jq 'map(select(.state=="open"))[0].number // empty' || true)
          if [ -z "$PR" ]; then
            echo "no open PR for $HEAD_SHA; nothing to do"; echo "SKIP=1" >> "$GITHUB_ENV"; exit 0
          fi
          echo "PR=$PR" >> "$GITHUB_ENV"
          # Wait (bounded) until every REVIEWER workflow RUN on this head has
          # completed. Gate on the Actions RUN status (needs actions: read), NOT
          # `gh pr checks` buckets: when a PR's reviewers post no commit status,
          # the commit's COMBINED status stays "pending" (GitHub's default with
          # 0 statuses), which fooled bucket detection into a perpetual "pending"
          # -> 6min timeout -> SKIP -> the ledger silently never posted.
          # concurrency (cancel-in-progress) supersedes this waiter when a later
          # reviewer finishes, so the LAST reviewer proceeds.
          for i in $(seq 1 24); do
            running=$(gh api "repos/$REPO/actions/runs?head_sha=$HEAD_SHA&event=pull_request&per_page=100" 2>/dev/null \
              | jq --arg r "$REVIEWERS" \
                  '[.workflow_runs[] | select(.name|test("^(" + $r + ")$")) | select(.status != "completed")] | length' \
              2>/dev/null || echo 1)
            running=${running:-1}
            if [ "$running" = "0" ]; then
              echo "all reviewer runs complete -- writing ledger for PR #$PR"; exit 0
            fi
            echo "reviewer runs still running: $running (poll $i)…"; sleep 15
          done
          echo "::notice title=Findings ledger::Timed out waiting for reviewer checks on PR #$PR; ledger not posted this run."
          echo "SKIP=1" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        with:
          fetch-depth: 0
          # base default branch only -- never the untrusted head ref.

      # Pre-gather every reviewer input deterministically in bash so the agent
      # does PURE judgment (read files -> triage -> write one file) instead of
      # ~20 gh round-trips. This is the main turn/latency/cost reducer: the old
      # gh-driven prompt ran ~39 turns; the deterministic I/O needs no model.
      - name: Gather ledger inputs
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        run: |
          set -euo pipefail
          mkdir -p .ledger-inputs
          # NOTE: ?per_page=100 (no --paginate) fetches ONE JSON array = the
          # newest 100 of each. The ledger is created early so it stays on page
          # 1; only a PR with >100 comments could drop later reviewer text.
          gh api "repos/$REPO/issues/$PR/comments?per_page=100" > .ledger-inputs/issue-comments.json
          gh api "repos/$REPO/pulls/$PR/reviews?per_page=100"   > .ledger-inputs/reviews.json
          gh api "repos/$REPO/pulls/$PR/comments?per_page=100"  > .ledger-inputs/review-comments.json
          gh pr diff "$PR" > .ledger-inputs/diff.patch 2>/dev/null \
            || { echo "::warning title=Findings ledger::gh pr diff failed -- ledger will triage without diff context."; : > .ledger-inputs/diff.patch; }
          # UTC date for the append-only audit log line (the agent has no clock
          # and must not shell out to git/gh).
          date -u +%F > .ledger-inputs/today.txt
          # Existing ledger body for the CUMULATIVE merge (the compose agent reads
          # this). The comment id for PATCH is resolved fresh at post time by
          # post_sticky_comment.py, so it's not captured here.
          # (.body // "") guards against a null comment body breaking startswith.
          MARK='## 📋 Review Findings Ledger'
          jq -r --arg m "$MARK" '[.[] | select((.body // "")|startswith($m))] | last | .body // ""' \
            .ledger-inputs/issue-comments.json > .ledger-inputs/existing.md
          # One flat markdown of every reviewer's output (excluding the ledger
          # itself) -- the agent reads this ONE file instead of parsing JSON.
          {
            jq -r --arg m "$MARK" '.[] | select(((.body // "")|startswith($m))|not) | "\n### issue comment by @\(.user.login)\n\(.body)"' .ledger-inputs/issue-comments.json
            jq -r '.[] | select(.body != null and .body != "") | "\n### review by @\(.user.login) [\(.state)]\n\(.body)"' .ledger-inputs/reviews.json
            jq -r '.[] | "\n### inline comment by @\(.user.login) (\(.path):\(.line // .original_line // "?"))\n\(.body)"' .ledger-inputs/review-comments.json
          } > .ledger-inputs/reviewer_outputs.md
          echo "gathered $(jq length .ledger-inputs/issue-comments.json) issue comments; existing ledger present=$([ -s .ledger-inputs/existing.md ] && echo yes || echo no)"

      # The agent does ONLY judgment: read the pre-gathered files, triage, and
      # WRITE the merged ledger to a file. It posts nothing (next step does) and
      # touches no gh/git -- so the task is small and bounded enough to run on
      # Haiku with a turn cap, cutting the ~39-turn / ~4min / ~$1.21 Sonnet run.
      - name: Compose findings ledger
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        continue-on-error: true   # advisory: a flaky agent run must not show red
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          plugin_marketplaces: 'https://github.com/siongsheng/claude-panel.git'
          plugins: 'panel@claude-panel'
          claude_args: '--model claude-haiku-4-5-20251001 --max-turns 15 --allowed-tools "Read,Write,Grep,Glob"'
          prompt: |
            Compose the Review Findings Ledger for PR #${{ env.PR }} in ${{ env.REPO }}.
            Every reviewer input is ALREADY gathered as files in `.ledger-inputs/`.
            Do NOT call gh or git. Read these files:
              - reviewer_outputs.md : every reviewer's output (DeepSeek, Claude
                /code-review, architecture review, inline comments)
              - diff.patch          : the PR diff, for context
              - existing.md         : the CURRENT ledger body (empty if none yet)
              - today.txt           : today's UTC date (for the audit log line)

            Apply the panel `blocker-triage` and `findings-ledger` skills:
            1. TRIAGE every finding: real vs false (expect ~30-40% false), set the
               triaged severity, check whether it is pre-existing on the base
               branch (only defects THIS PR introduced can block), and dedupe
               findings multiple reviewers raised into ONE row (list all sources).
            2. MERGE cumulatively into `existing.md`: preserve every prior row and
               its ID, change only Status as findings resolve (✅ Fixed, ❌
               Rejected, 📋 Deferred → #N), append new findings with the next ID,
               never drop a row. If existing.md is empty AND nothing survives
               triage, produce the clean "✅ Reviewed — no issues found" ledger
               naming which reviewers ran.
            3. APPEND to the append-only **Audit log** section (below the table;
               create it if absent). Add ONE line for THIS run summarizing what
               changed, attributed to the automated actor and dated with the
               contents of today.txt, e.g.
               `- \`<today.txt> · auto-ledger (CI) · R1,R2 added; R2 ❌ Rejected\``.
               If nothing changed this run, add a line saying so (`no changes`).
               PRESERVE every existing audit line verbatim — never rewrite or
               reorder them (see the findings-ledger skill's Audit log section).
            4. WRITE the COMPLETE updated ledger markdown to
               `.ledger-inputs/ledger.md`. It MUST begin with the exact line
               `## 📋 Review Findings Ledger` and contain the table (columns:
               ID | Finding | Source | Severity | Status) followed by the Audit log.

            Write ONLY that file. Post nothing (a later step posts it). Do not
            modify code.

      # Deterministic post: PATCH the existing ledger comment or POST a new one.
      # Moving the post out of the agent makes it reliable AND makes a missing
      # ledger.md a LOUD ::error:: instead of a silent green no-op (see #28).
      - uses: actions/setup-python@v5
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        with:
          python-version: '3.12'
      # Deterministic, unit-tested post of the ONE sticky ledger comment
      # (normalize fenced output -> assert marker -> edit-in-place, else create).
      # Shared logic lives in scripts/post_sticky_comment.py so the fence/marker/
      # dedup edge cases are tested, not re-inlined per workflow. It does its OWN
      # fresh comment lookup by marker (so `existing_id.txt` is no longer needed
      # for posting, and the post is immune to a stale gather-time snapshot).
      # ADVISORY: a missing/malformed file or transient gh error is a loud
      # ::error:: but never fails the build.
      - name: Post ledger
        if: env.HAS_TOKEN == 'true' && env.SKIP != '1'
        run: |
          python3 scripts/post_sticky_comment.py "$PR" \
            --marker '## 📋 Review Findings Ledger' \
            --body-file .ledger-inputs/ledger.md
