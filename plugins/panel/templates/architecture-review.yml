name: Architecture review

# Panel's UNIVERSAL, repo-agnostic architecture reviewer (the Claude-family
# architecture lens). No plugin dependency: architecture-review criteria are
# decades-stable, so they live in the prompt rather than tracking a fast-moving
# third-party skill. For deeper, language-specific depth, `/panel-init` can
# SUGGEST a stack-matched marketplace skill as an opt-in upgrade -- it does not
# replace this floor.
#
# The prompt below DISTILLS the stable patterns from the surveyed
# architecture-review skills + literature so the floor captures their substance
# without their churn/licensing:
#   - coupling & cohesion as the dominant axes  (SE literature, arXiv:1901.09050)
#   - dependency-direction & hexagonal/layering rubric   (decebals/java)
#   - concrete complexity thresholds + refactor roadmap  (pokayokay/srstomp)
#   - disciplined, evidence-based, high-signal findings   (getsentry code-review)
#   - architectural-decision (ADR) & trade-off lens        (vasilyu; adr.github.io)
#   - versioned API contracts, consistent error-handling, externalized config,
#     right-level abstraction, change-propagation blast radius  (wshobson/agents,
#     MIT Architecture Review Checklist)
#
# The official claude-code-review.yml runs /code-review (correctness/quality),
# NOT architecture -- this is the complementary architecture lens.
#
# Runs on every push to the PR (like the other reviewers) so the LATEST code is
# always architecture-reviewed; concurrency below cancels an in-flight run on a
# new push to bound cost. ADVISORY (posts comments, never blocks; hard gates
# stay deterministic -- bin/tdd-check + the repo's tests/linters).
#
# POSTING: the agent COMPOSES its review to a file; a deterministic bash step
# POSTS it as ONE sticky comment (edit-in-place). claude-code-action's own
# posting model classifies INLINE comments and posts nothing for a clean/grouped
# review -- so relying on it made this reviewer a silent no-op. Composing to a
# file + posting in bash guarantees the review is ALWAYS visible (even when
# clean) and a run that produces nothing is a loud ::error::, never a green
# no-op.
on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write   # post/update the ONE sticky architecture-review comment
  issues: read
  id-token: write

concurrency:
  group: architecture-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  architecture-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No-op cleanly until CLAUDE_CODE_OAUTH_TOKEN is set (via /install-github-app).
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      MARK: '## 🏛️ Architecture Review'
    steps:
      - name: Skip notice
        if: env.HAS_TOKEN != 'true'
        run: echo "CLAUDE_CODE_OAUTH_TOKEN not set -- skipping architecture review. Run /install-github-app to set it, or run the /panel loop locally."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          fetch-depth: 0

      # Pre-gather the diff so the agent reads a file instead of shelling out; it
      # still uses Read/Grep/Glob on the checkout to inspect the WIDER codebase
      # (coupling, dependency direction, blast radius).
      - name: Gather diff
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          mkdir -p .arch-review
          gh pr diff "$PR" > .arch-review/diff.patch 2>/dev/null || : > .arch-review/diff.patch
          echo "diff bytes: $(wc -c < .arch-review/diff.patch)"

      # The agent ANALYZES and WRITES its review to a file; it posts nothing (the
      # next step does). Deep-reasoning work -- keep the default model, NOT Haiku
      # (unlike the findings-ledger's mechanical compose step).
      - name: Compose architecture review
        if: env.HAS_TOKEN == 'true'
        continue-on-error: true   # advisory: a flaky agent run must not show red
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}   # explicit token for the action's own GitHub API ops
          claude_args: '--allowed-tools "Read,Grep,Glob"'
          prompt: |
            You are an ARCHITECTURE reviewer for PR #${{ env.PR }}.
            Correctness/quality is covered by the separate /code-review workflow
            -- do NOT duplicate it.

            The PR diff is in `.arch-review/diff.patch`. Read it, and use
            Read/Grep/Glob on the repo to inspect the WIDER codebase for context.
            Judge ONLY what THIS change introduces; list pre-existing debt
            separately and never block on it.

            Walk this checklist and cite file:line evidence for every finding.
            COUPLING and COHESION are the dominant concerns -- weight them most.
            1. BOUNDARIES & COHESION: Does the change respect module/layer
               boundaries and separation of concerns? Flag logic leaking across
               layers or a module taking on a second responsibility.
            2. DEPENDENCY DIRECTION: Do dependencies point toward stable
               abstractions (domain/core), never domain->infrastructure or
               stable->volatile? Flag new cycles and inward-pointing violations
               (Dependency Inversion / ports-and-adapters).
            3. COMPLEXITY & ABSTRACTION LEVEL: Flag concrete signals, not vibes
               -- oversized functions/files, deep nesting, high fan-in/fan-out,
               a new god-object, duplicated structure that should be extracted;
               AND the reverse -- over-/under-engineering (abstraction that
               doesn't earn its keep, or a missing seam).
            4. CONTRACTS, BREAKING CHANGES & BLAST RADIUS: Breaking changes to
               public API, schema, types, or wire/event formats? Are contracts
               well-defined and versioned? Trace the change-propagation blast
               radius -- what else must change or could break downstream?
            5. ERROR-HANDLING & CONFIGURATION: Does it follow a consistent
               error-handling strategy (errors propagate, never silently
               swallowed)? Is configuration externalized rather than hardcoded?
            6. ARCHITECTURAL DECISIONS: Does the change make a significant,
               undocumented architectural decision? Are alternatives/trade-offs
               reasonable? Flag decisions that warrant an ADR or that silently
               reverse an established pattern or an accepted ADR.

            DISCIPLINE: read-only and high-signal -- report only issues you can
            justify with evidence; do not invent findings to seem thorough, and
            say so plainly when the architecture is sound.

            WRITE your review to `.arch-review/arch-review.md` -- post nothing, a
            later step posts it. The file MUST BEGIN with this EXACT line:
            ## 🏛️ Architecture Review
            Then: findings grouped by checklist item, each with severity
            (BLOCKER / SHOULD-FIX / NIT) and file:line; a short prioritized
            REFACTOR ROADMAP (highest-leverage first); and a final line --
            VERDICT: APPROVED | CHANGES REQUESTED | BLOCKED, RISK: LOW | MEDIUM
            | HIGH. If the architecture is sound, STILL write the file: state
            "No architectural issues found." with VERDICT: APPROVED. Do not
            modify code.

      # Deterministic post of ONE sticky architecture-review comment (edit in
      # place, else create). ALWAYS posts -- a clean review stays visible, not
      # silent -- and a missing/malformed file is a loud ::error::, never a green
      # no-op.
      - name: Post architecture review
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          REVIEW=.arch-review/arch-review.md
          if [ ! -s "$REVIEW" ]; then
            echo "::error title=Architecture review::agent produced no review file -- nothing posted (see Compose step log)."
            exit 0   # advisory: never fail the build, but never hide it either
          fi
          # Tolerate an over-formatted agent: strip a leading/trailing ``` fence
          # and leading blank lines so the sticky marker can be line 1.
          awk '
            BEGIN{started=0; n=0}
            { if(!started){ if($0 ~ /^[[:space:]]*```/) next; if($0 ~ /^[[:space:]]*$/) next; started=1 }
              buf[++n]=$0 }
            END{ if(n>0 && buf[n] ~ /^[[:space:]]*```[[:space:]]*$/) n--; for(i=1;i<=n;i++) print buf[i] }
          ' "$REVIEW" > "$REVIEW.clean" && mv "$REVIEW.clean" "$REVIEW"
          # The sticky marker MUST be line 1, or the next run can't find this
          # comment and would POST a duplicate every run -- fail loud instead.
          if ! head -1 "$REVIEW" | grep -qF "$MARK"; then
            echo "::error title=Architecture review::review file missing '$MARK' on line 1 -- NOT posting (would duplicate next run)."
            exit 0
          fi
          ID=$(gh api "repos/$REPO/issues/$PR/comments?per_page=100" \
                | jq -r --arg m "$MARK" '[.[] | select((.body // "")|startswith($m))] | last | .id // empty')
          if [ -n "$ID" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$ID" -F body=@"$REVIEW" >/dev/null
            echo "updated architecture-review comment $ID"
          else
            gh api --method POST "repos/$REPO/issues/$PR/comments" -F body=@"$REVIEW" >/dev/null
            echo "posted new architecture-review comment on PR #$PR"
          fi
