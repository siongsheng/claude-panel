# This repo's own copy of templates/tdd-gate.yml — identical except the checker
# path (this repo keeps bin/ under plugins/panel/). Downstream repos get the
# generic template via /panel-init.
name: TDD gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Least privilege: read the code only.
permissions:
  contents: read

concurrency:
  group: tdd-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tdd-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # the check is near-instant; cap a hung runner.
    steps:
      - uses: actions/checkout@v4
        with:
          # tdd-check verifies test-before-impl by ANCESTRY, so the full
          # history of base..head must be present -- a shallow clone breaks it.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Self-test: prove the checker actually works in CI before trusting it as a
      # gate. (Dogfood copy — the test file always lives here, so no guard.)
      - name: Self-test tdd-check
        run: python3 plugins/panel/bin/test_tdd_check.py
      # Run against the PR's ACTUAL base ref, never a hardcoded `main`.
      - name: Run tdd-check
        run: >-
          python3 plugins/panel/bin/tdd-check
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"
